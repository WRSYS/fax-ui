name: release-please
on:
  push:
    branches:
      - main
  workflow_dispatch: {}
permissions:
  contents: write
  issues: write
  pull-requests: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          # Use a GitHub App installation token so downstream workflows run
          token: ${{ steps.app-token.outputs.token }}
          # Minimal footprint: use language-specific release type without manifest/config
          release-type: go

      - name: Check out repository
        uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created }}

      - name: Tag major and minor versions
        if: ${{ steps.release.outputs.release_created }}
        env:
          MAJOR: ${{ steps.release.outputs.major }}
          MINOR: ${{ steps.release.outputs.minor }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          git config user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config user.email '${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git fetch --tags --force
          # Authenticate pushes with GitHub App token
          git remote set-url origin "https://x-access-token:${GH_APP_TOKEN}@github.com/${{ github.repository }}.git"
          # Delete existing remote tags if present
          git push origin :refs/tags/v${MAJOR} || true
          git push origin :refs/tags/v${MAJOR}.${MINOR} || true
          # Recreate tags pointing to the release commit
          git tag -a v${MAJOR} ${RELEASE_SHA} -m "Release v${MAJOR}"
          git tag -a v${MAJOR}.${MINOR} ${RELEASE_SHA} -m "Release v${MAJOR}.${MINOR}"
          git push origin v${MAJOR}
          git push origin v${MAJOR}.${MINOR}
